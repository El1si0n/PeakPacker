<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no" />
    <meta name="theme-color" id="theme-color-meta" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PeakPacker</title>
  </head>
  <body>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem("peakpacker-theme");
          if (!savedTheme) {
            savedTheme = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", savedTheme);
          document.getElementById("theme-color-meta").setAttribute("content", savedTheme === "dark" ? "#0a0a0a" : "#ffffff");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
